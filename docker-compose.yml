# Развёртывание на VDS: docker compose up -d --build
# Перед запуском: cp .env.example .env и заполните SECRET_KEY, DB_PASSWORD, ALLOWED_HOSTS

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-competitions_db}
      POSTGRES_USER: ${DB_USER:-competitionhub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Задайте DB_PASSWORD в .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-competitionhub_user} -d ${DB_NAME:-competitions_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      USE_SQLITE: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
      - staticfiles:/app/staticfiles
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/staticfiles:ro
      - media:/var/www/media:ro

volumes:
  pgdata:
  media:
  staticfiles:
