{% extends 'base.html' %}
{% block title %}Удаление: {{ task.title }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-inner">
        <h1>Удалить задачу?</h1>
        <p class="section-desc callout-line">«{{ task.title }}» будет удалена без возможности восстановления.</p>
        <form method="post" action="">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a class="btn btn-ghost" href="{% url 'competitions:task_list' competition_id=task.competition_id %}">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
