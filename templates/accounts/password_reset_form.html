{% extends 'base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <div class="card-inner">
        <h1>Восстановление пароля</h1>
        <p class="section-desc mb-1">Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.</p>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn">Отправить ссылку</button>
                <a class="btn btn-ghost" href="{% url 'accounts:login' %}">Назад к входу</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
