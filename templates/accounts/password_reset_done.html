{% extends 'base.html' %}
{% block title %}Письмо отправлено{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <div class="card-inner">
        <h1>Проверьте почту</h1>
        <p class="mb-1">Если аккаунт с таким email существует, мы отправили на него ссылку для сброса пароля.</p>
        <p class="text-sm muted mb-1">Проверьте папку «Спам», если письма нет во входящих.</p>
        <div class="form-actions">
            <a class="btn btn-secondary" href="{% url 'accounts:login' %}">Войти</a>
            <a class="btn btn-ghost" href="{% url 'competitions:home' %}">На главную</a>
        </div>
    </div>
</div>
{% endblock %}
