{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="card mx-auto w-full max-w-lg auth-card">
    <div class="card-inner">
        <p class="auth-teaser">&lt;_</p>
        <h1>Регистрация</h1>
        <p>Создай аккаунт — и можно участвовать в соревнованиях.</p>
        <form method="post" action="/accounts/register/">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn">Зарегистрироваться</button>
                <a class="btn btn-ghost" href="/accounts/login/">Уже есть аккаунт</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
