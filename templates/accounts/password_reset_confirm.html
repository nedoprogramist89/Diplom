{% extends 'base.html' %}
{% block title %}Введите новый пароль{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <div class="card-inner">
        <h1>Новый пароль</h1>
        <p class="section-desc mb-1">Введите новый пароль дважды.</p>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn">Сохранить пароль</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
