{% extends 'base.html' %}
{% block title %}Редактирование профиля{% endblock %}
{% block content %}
<div class="card">
    <div class="card-inner">
        <h1>Редактирование профиля</h1>
        <p class="section-desc mb-1">Измените имя, email, организацию или тему оформления сайта.</p>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn">Сохранить</button>
                <a class="btn btn-ghost" href="{% url 'accounts:profile' %}">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
